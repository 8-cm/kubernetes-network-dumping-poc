---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: team-beta
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      initContainers:
        - name: init-html
          image: nginx:alpine
          command: ["/bin/sh", "-c"]
          args:
            - envsubst '${NAMESPACE} ${POD_NAME} ${NODE_NAME} ${MESSAGE}' < /tmpl/index.html > /html/index.html
          env:
            - name: MESSAGE
              value: "team-beta — egress via worker6 (172.19.0.10)"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /tmpl/index.html
              subPath: index.html
            - name: html
              mountPath: /html
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          command: ["/bin/sh", "-c"]
          args:
            - touch /data/in.log /data/out.log && chmod 666 /data/in.log /data/out.log && exec nginx -g 'daemon off;'
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: html
              mountPath: /usr/share/nginx/html
            - name: data
              mountPath: /data
        - name: gen-cross
          image: curlimages/curl:latest
          env:
            - name: MY_NS
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_POD
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command: ["/bin/sh", "-c"]
          args:
            - |
              SHARD1=haproxy-shard-1-kubernetes-ingress.haproxy-system.svc.cluster.local
              SHARD2=haproxy-shard-2-kubernetes-ingress.haproxy-system.svc.cluster.local
              N=0
              while true; do
                N=$((N+1))
                TS=$(date -u +%H%M%S)
                if [ $((N%2)) -eq 0 ]; then
                  THOST="team-alpha.example.com"; SHARD=$SHARD1
                else
                  THOST="team-gamma.example.com"; SHARD=$SHARD2
                fi
                if [ $((N%6)) -eq 0 ]; then
                  CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 \
                    http://blackhole.team-beta.svc.cluster.local/ 2>/dev/null)
                  [ "$CODE" = "000" ] && CODE="refused"
                  printf '[%s] chaos → blackhole.team-beta: %s\n' "$(date -u +%H:%M:%S)" "$CODE" >> /data/out.log
                elif [ $((N%4)) -eq 0 ]; then
                  CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 \
                    -H "Host: $THOST" \
                    "http://$SHARD/chaos-not-found?from=${MY_NS}&pod=${MY_POD}&ts=${TS}" 2>/dev/null)
                  printf '[%s] chaos → %s/not-found: %s\n' "$(date -u +%H:%M:%S)" "$THOST" "$CODE" >> /data/out.log
                else
                  CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 \
                    -H "Host: $THOST" \
                    "http://$SHARD/?from=${MY_NS}&pod=${MY_POD}&ts=${TS}" 2>/dev/null)
                  printf '[%s] cross → %s: %s\n' "$(date -u +%H:%M:%S)" "$THOST" "$CODE" >> /data/out.log
                fi
                sleep 8
              done
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: hello-nginx
        - name: html
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: team-beta
spec:
  selector:
    app: hello
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello
  namespace: team-beta
spec:
  ingressClassName: haproxy-shard-2
  rules:
    - host: team-beta.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello
                port:
                  number: 80
