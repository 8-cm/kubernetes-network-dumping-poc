kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: b-cluster

networking:
  disableDefaultCNI: true  # Required for Cilium
  kubeProxyMode: none      # Cilium replaces kube-proxy
  podSubnet: "10.245.0.0/16"
  serviceSubnet: "10.97.0.0/16"

nodes:
  # --- Control Plane Nodes ---
  - role: control-plane
  - role: control-plane
  - role: control-plane

  # --- Worker Nodes ---
  - role: worker
  - role: worker
  - role: worker
  - role: worker

  # --- Network Nodes — tainted + labelled post-creation via setup.sh ---
  # Kind names these worker5 (shard-1) and worker6 (shard-2)
  - role: worker  # network-00 / haproxy-shard-1
  - role: worker  # network-01 / haproxy-shard-2
