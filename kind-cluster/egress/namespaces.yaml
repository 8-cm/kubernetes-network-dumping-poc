---
apiVersion: v1
kind: Namespace
metadata:
  name: team-alpha
  labels:
    # Used by CiliumEgressGatewayPolicy namespaceSelector
    egress-group: alpha
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-beta
  labels:
    egress-group: beta
---
# No CiliumEgressGatewayPolicy for this namespace.
# Pods egress from whichever node they are scheduled on.
apiVersion: v1
kind: Namespace
metadata:
  name: team-gamma
