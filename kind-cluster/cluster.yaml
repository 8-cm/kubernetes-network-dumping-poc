kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: multi-cp-cluster

networking:
  disableDefaultCNI: true  # Required for Cilium
  kubeProxyMode: none      # Cilium replaces kube-proxy

nodes:
  # --- Control Plane Nodes (3) ---
  - role: control-plane
  - role: control-plane
  - role: control-plane

  # --- Worker Nodes (4) ---
  - role: worker
  - role: worker
  - role: worker
  - role: worker

  # --- Network Nodes (2) — labelled post-creation via setup.sh ---
  - role: worker
  - role: worker
